<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Kick Emote Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: sans-serif;
  }

  #emote-container {
    position: fixed;
    /* ─── AJUSTÁ ESTAS 4 LÍNEAS PARA MOVER EL ÁREA DE EMOTES ─── */
    bottom: 20px;
    left: 20px;
    width: 300px;
    height: 120px;
    /* ──────────────────────────────────────────────────────────── */

    display: flex;
    flex-wrap: wrap;
    align-content: flex-end;
    align-items: flex-end;
    gap: 6px;
    padding: 6px;
  }

  .emote-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }

  .emote-wrapper.fading {
    animation: fadeOut 0.5s ease forwards;
  }

  .emote-wrapper img {
    width: 48px;
    height: 48px;
    object-fit: contain;
    image-rendering: auto;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6));
  }

  .emote-count {
    font-size: 10px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.9), 0 0 6px rgba(0,0,0,0.6);
    margin-top: 2px;
    line-height: 1;
  }

  @keyframes popIn {
    0%   { transform: scale(0) translateY(10px); opacity: 0; }
    100% { transform: scale(1) translateY(0);    opacity: 1; }
  }

  @keyframes fadeOut {
    0%   { opacity: 1; transform: scale(1) translateY(0); }
    100% { opacity: 0; transform: scale(0.7) translateY(-8px); }
  }

  /* Panel de configuración — solo visible fuera de OBS */
  #config-panel {
    position: fixed;
    top: 10px;
    right: 10px;
    background: rgba(20, 20, 20, 0.92);
    border: 1px solid #53fc18;
    border-radius: 10px;
    padding: 14px 16px;
    color: #fff;
    font-size: 13px;
    width: 240px;
    z-index: 9999;
  }

  #config-panel h3 {
    color: #53fc18;
    font-size: 14px;
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }

  #config-panel label {
    display: block;
    margin-top: 8px;
    font-size: 11px;
    color: #aaa;
  }

  #config-panel input[type="text"] {
    width: 100%;
    padding: 5px 8px;
    margin-top: 3px;
    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 5px;
    color: #fff;
    font-size: 12px;
    outline: none;
  }

  #config-panel input[type="text"]:focus {
    border-color: #53fc18;
  }

  #connect-btn {
    margin-top: 12px;
    width: 100%;
    padding: 7px;
    background: #53fc18;
    color: #000;
    font-weight: 700;
    font-size: 13px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s;
  }

  #connect-btn:hover { background: #44d914; }

  #status {
    margin-top: 8px;
    font-size: 11px;
    text-align: center;
    color: #888;
    min-height: 16px;
  }

  #status.connected { color: #53fc18; }
  #status.error     { color: #ff4545; }

  .hide-in-obs { display: block; }
</style>
</head>
<body>

<!-- Panel de config (escondelo en OBS con CSS personalizado si querés) -->
<div id="config-panel" class="hide-in-obs">
  <h3>⚡ Kick Emote Overlay</h3>
  <label>Nombre del canal de Kick</label>
  <input type="text" id="channel-input" placeholder="tu_canal" />
  <button id="connect-btn" onclick="connect()">Conectar</button>
  <div id="status">Ingresá tu canal y conectate</div>
</div>

<!-- Acá aparecen los emotes -->
<div id="emote-container"></div>

<script>
  // ─── CONFIG ───────────────────────────────────────────────
  const EMOTE_DURATION_MS = 4000;  // cuántos ms dura cada emote visible
  const MAX_EMOTES        = 12;    // máximo de emotes en pantalla a la vez
  // ──────────────────────────────────────────────────────────

  let ws = null;
  let channelId = null;
  const container = document.getElementById('emote-container');
  const statusEl  = document.getElementById('status');

  // Conexión automática al canal
  autoConnect("santulp");

  async function connect() {
    const channelName = document.getElementById('channel-input').value.trim().toLowerCase();
    if (!channelName) return;
    setStatus('Buscando canal...', '');
    await autoConnect(channelName);
  }

  async function autoConnect(channelName) {
    // 1. Buscar el channelId desde la API pública de Kick
    try {
      const variants = [channelName, channelName.toLowerCase(), channelName.toUpperCase(),
        channelName.charAt(0).toUpperCase() + channelName.slice(1)];
      let found = false;
      for (const variant of [...new Set(variants)]) {
        try {
          const res  = await fetch(`https://kick.com/api/v2/channels/${variant}`);
          if (!res.ok) continue;
          const data = await res.json();
          // Kick uses chatroom.id to subscribe, NOT channel id
          if (data && data.chatroom && data.chatroom.id) {
            channelId = data.chatroom.id;
            found = true;
            break;
          }
        } catch(_) {}
      }
      if (!found) throw new Error('Canal no encontrado');
    } catch(e) {
      setStatus('❌ Canal no encontrado — revisá el nombre del canal', 'error');
      return;
    }

    // 2. Conectar al WebSocket de Kick (Pusher)
    if (ws) ws.close();

    const PUSHER_KEY = '32cbd69e4b950bf97679';
    ws = new WebSocket(`wss://ws-us2.pusher.com/app/${PUSHER_KEY}?protocol=7&client=js&version=7.6.0&flash=false`);

    ws.onopen = () => {
      ws.send(JSON.stringify({
        event: 'pusher:subscribe',
        data:  { auth: '', channel: `chatrooms.${channelId}.v2` }
      }));
      setStatus(`✅ Conectado a /${document.getElementById('channel-input')?.value || channelName}`, 'connected');
    };

    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        // Mostrar en status el último evento recibido (debug)
        if (msg.event && msg.event !== 'pusher:ping' && msg.event !== 'pusher:pong') {
          setStatus(`✅ Conectado | último evento: ${msg.event}`, 'connected');
        }
        if (msg.event === 'App\\Events\\ChatMessageEvent') {
          const payload = JSON.parse(msg.data);
          handleMessage(payload);
        }
      } catch(_) {}
    };

    ws.onerror = () => setStatus('❌ Error de conexión', 'error');
    ws.onclose = () => setStatus('Desconectado', '');
  }

  function handleMessage(payload) {
    // Intentar distintas estructuras que usa Kick
    const emotes = payload?.message?.emotes
                || payload?.emotes
                || payload?.content?.emotes
                || [];

    if (emotes.length === 0) {
      // Si hay mensaje pero sin emotes, igual mostramos algo en status
      setStatus(`✅ Conectado | msg sin emotes`, 'connected');
      return;
    }

    emotes.forEach(emote => {
      // Kick puede mandar src, images.url, o url directo
      const src = emote.src || emote?.images?.url || emote?.url || emote?.gif_url;
      if (!src) return;
      const count = (emote.positions?.length) || emote.count || 1;
      showEmote(src, count);
    });
  }

  function showEmote(src, count) {
    // Limitar máximo de emotes en pantalla
    const existing = container.querySelectorAll('.emote-wrapper:not(.fading)');
    if (existing.length >= MAX_EMOTES) {
      removeEmote(existing[0]);
    }

    const wrapper = document.createElement('div');
    wrapper.className = 'emote-wrapper';

    const img = document.createElement('img');
    img.src = src;
    img.onerror = () => wrapper.remove(); // si el emote no carga, lo saca

    wrapper.appendChild(img);

    if (count > 1) {
      const badge = document.createElement('div');
      badge.className = 'emote-count';
      badge.textContent = `x${count}`;
      wrapper.appendChild(badge);
    }

    container.appendChild(wrapper);

    // Auto-remover después del tiempo configurado
    setTimeout(() => removeEmote(wrapper), EMOTE_DURATION_MS);
  }

  function removeEmote(el) {
    if (!el || el.classList.contains('fading')) return;
    el.classList.add('fading');
    setTimeout(() => el.remove(), 500);
  }

  function setStatus(msg, cls) {
    statusEl.textContent = msg;
    statusEl.className   = cls;
  }
</script>
</body>
</html>
